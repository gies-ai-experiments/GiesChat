name: Deploy GiesChat to Azure

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'client/**'
      - 'packages/**'
      - 'librechat.yaml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: gieschat-azure-deploy
  cancel-in-progress: true

env:
  ACR_LOGIN_SERVER: dlacrgieschat.azurecr.io
  IMAGE_NAME: dlacrgieschat.azurecr.io/gieschat/api
  WEBAPP_NAME: gieschat

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
