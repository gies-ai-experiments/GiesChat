version: 1.3.11
cache: true

interface:
  agents:
    use: true
    create: false
    share: false
  marketplace:
    use: true
  defaultPinnedTools:
    - mcp
  mcpServers:
    placeholder: MCP
    use: true
    create: true
    share: false
    public: false
    trustCheckbox:
      label:
        en: I understand and want to connect this MCP server
      subLabel:
        en: Only connect MCP servers you trust. MCP tools can send context to external services and may take actions on your behalf.

mcpServers:
  gies-demo:
    type: stdio
    command: node
    args:
      - e2e/setup/fake-mcp-server.js
    title: Gies Demo MCP
    description: Local demo MCP server for testing the MCP picker.
    timeout: 30000
  canvas:
    type: streamable-http
    url: https://canvas-mcp.azurewebsites.net/mcp
    oauth:
      client_id: "${CANVAS_MCP_CLIENT_ID}"
      client_secret: "${CANVAS_MCP_CLIENT_SECRET}"
      authorization_url: "https://login.microsoftonline.com/44467e6f-462c-4ea2-823f-7800de5434e3/oauth2/v2.0/authorize"
      token_url: "https://login.microsoftonline.com/44467e6f-462c-4ea2-823f-7800de5434e3/oauth2/v2.0/token"
      scope: "api://e1443fda-5aa7-4136-a884-d97f64258ef0/access_as_user"
    title: Canvas MCP
    description: Connect your Canvas account — sign in with your Illinois account.
    timeout: 30000

endpoints:
  custom:
    - name: 'Azure OpenAI'
      apiKey: '${AZURE_OPENAI_API_KEY}'
      baseURL: 'https://ashleyn4-7611-resource.openai.azure.com/openai/v1'
      models:
        default:
          - gpt-5.4
          - gpt-5.5
        fetch: false
      titleConvo: true
      titleModel: 'gpt-5.4'
      modelDisplayLabel: 'Azure OpenAI'
