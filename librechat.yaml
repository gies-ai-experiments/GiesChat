version: 1.3.11
cache: true

interface:
  brainstormRooms: false
  agents:
    use: true
    create: false
    share: false
  marketplace:
    use: true
  defaultPinnedTools:
    - mcp
  mcpServers:
    placeholder: MCP
    use: true
    create: true
    share: false
    public: false
    trustCheckbox:
      label:
        en: I understand and want to connect this MCP server
      subLabel:
        en: Only connect MCP servers you trust. MCP tools can send context to external services and may take actions on your behalf.

mcpServers:
  gies-demo:
    type: stdio
    command: node
    args:
      - e2e/setup/fake-mcp-server.js
    title: Gies Demo MCP
    description: Local demo MCP server for testing the MCP picker.
    timeout: 30000
  canvas:
    type: stdio
    command: uvx
    args:
      - --from
      - canvas-mcp
      - canvas-mcp-server
    env:
      CANVAS_API_URL: "https://canvas.illinois.edu/api/v1"
      CANVAS_API_TOKEN: "{{CANVAS_API_TOKEN}}"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_TOOL_DIR: /tmp/uv-tools
    title: Canvas MCP
    description: Connect your Illinois Canvas account with your Canvas access token.
    timeout: 30000
    customUserVars:
      CANVAS_API_TOKEN:
        title: Canvas API Token
        description: Create this in Canvas under Account -> Settings -> New Access Token. This token is stored for your GiesChat user and used only to connect Canvas MCP.
        sensitive: true
  replit:
    type: stdio
    command: npx
    args:
      - -y
      - mcp-remote@0.1.38
      - https://replit-mcp.com/server/mcp
    title: Replit
    description: Build live apps with Replit Agent through the Gies Disruption Lab account.
    timeout: 120000
    initTimeout: 60000
    chatMenu: false
    serverInstructions: |
      Replit app-builder workflow (follow exactly):
      1. Call create_app_from_prompt AT MOST ONCE per requested app. Its result includes structured content with the app's replId and a replUrl. The replUrl is the Replit workspace page - never show it to the user and never put it in an artifact. The build runs in the background for a few minutes.
      2. Only use a replId that came from a tool result. If no tool result showed you the replId, call resolve_app_by_name with the exact app name you created - NEVER guess or invent a replId.
      3. To show the running app inside this chat, call ask_question with the replId asking: "Is the initial build finished? What is the live preview URL of this app - the https://....replit.dev URL where the running app can be viewed? Reply with the build status and the exact URL."
      4. Once you have the replit.dev URL, include this directive in your reply (replace APP NAME and the URL; keep the code fence):
      :::artifact{identifier="replit-app" type="application/vnd.external-url" title="APP NAME"}
      ```
      https://the-app-url.replit.dev
      ```
      :::
      5. If a reply says the Replit Agent is in Plan mode, paused, or waiting for approval (structured content phase "paused" with no build progress), call ask_question once with exactly: "The plan is approved. Please switch to Build mode and start building the app now." Do NOT trust its reply text - it may say it will build and still stay paused - so verify with a follow-up ask_question status check. If it is STILL paused after your approval, stop nudging and tell the user plainly that Replit paused this build for manual approval and Gies Disruption Lab staff need to enable it - never tell the user it is building.
      6. If the build is not finished, say so and ask the user to check back in a minute; repeat step 3 when they do.
      7. For changes, call update_app_using_prompt with the SAME replId, then re-emit the directive with the same preview URL.
      8. If a tool call times out, the build is still running - do not retry the call.

endpoints:
  custom:
    - name: 'Azure OpenAI'
      apiKey: '${AZURE_OPENAI_API_KEY}'
      baseURL: 'https://ashleyn4-7611-resource.openai.azure.com/openai/v1'
      models:
        default:
          - gpt-5.4
          - gpt-5.5
        fetch: false
      titleConvo: true
      titleModel: 'gpt-5.4'
      modelDisplayLabel: 'Azure OpenAI'
